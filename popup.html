<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      width: 320px;
      padding: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .logo-icon svg { display: block; width: 32px; height: 32px; }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f1f1f1;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }

    input[type="text"]:focus {
      border-color: #ff0000;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    button#start {
      width: 100%;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button#start:hover { background: #cc0000; }
    button#start:disabled { opacity: 0.5; cursor: not-allowed; }

    button#stop {
      width: 100%;
      background: #333;
      color: #f1f1f1;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      display: none;
    }

    button#stop:hover { background: #444; }

    #status {
      margin-top: 14px;
      font-size: 12px;
      color: #aaa;
      min-height: 18px;
      line-height: 1.5;
      text-align: center;
    }

    #status.found {
      color: #4caf50;
      font-weight: 600;
    }

    #status.error {
      color: #ff6b6b;
    }

    #status.searching {
      color: #ffb300;
    }

    .progress-bar {
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: #ff0000;
      border-radius: 2px;
      animation: indeterminate 1.1s ease-in-out infinite;
    }

    /* Honest indeterminate sweep — signals activity without faking a percentage.
       Real progress is the scanned count shown in #status. */
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }

    .progress-fill.done {
      width: 100%;
      animation: none;
      transform: none;
    }

    .divider {
      height: 1px;
      background: #222;
      margin: 18px 0;
    }

    .tip {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
      text-align: center;
    }

    .tip strong { color: #777; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 128 128">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff2d3f"/><stop offset="1" stop-color="#c1001a"/></linearGradient></defs>
        <rect width="128" height="128" rx="28" fill="url(#lg)"/>
        <line x1="80" y1="80" x2="104" y2="104" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
        <circle cx="56" cy="56" r="32" fill="#0d0d10"/>
        <circle cx="56" cy="56" r="32" fill="none" stroke="#fff" stroke-width="9"/>
        <path d="M48 44 L72 56 L48 68 Z" fill="#fff"/>
      </svg>
    </div>
    <div class="logo-text">
      Video Finder
      <div class="logo-sub">YouTube Channel Scroller</div>
    </div>
  </div>

  <label for="title">Video title to find</label>
  <input type="text" id="title" placeholder="Paste part of the video title…" />
  <div class="hint">Partial match works — just enough to be unique.</div>

  <button id="start">▶ Start Scrolling</button>
  <button id="stop">■ Stop</button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div id="status"></div>

  <div class="divider"></div>
  <div class="tip">
    <strong>How to use:</strong> Go to a YouTube channel's Videos tab, then enter the title above and click Start.
  </div>

  <script src="popup.js"></script>
</body>
</html>
